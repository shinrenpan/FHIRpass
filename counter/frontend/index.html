<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FHIRpass 櫃檯掃碼系統</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a56db;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 24px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 掃碼區 */
    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      min-height: 280px;
    }

    #reader video { border-radius: 8px; }

    .scan-status {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
    }
    .scan-status.idle     { background: #f3f4f6; color: #6b7280; }
    .scan-status.scanning { background: #eff6ff; color: #1d4ed8; }
    .scan-status.success  { background: #f0fdf4; color: #15803d; }
    .scan-status.error    { background: #fef2f2; color: #dc2626; }

    .stop-btn {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: white;
      color: #6b7280;
      font-size: 0.9rem;
      cursor: pointer;
      display: none;
      transition: background 0.15s;
    }
    .stop-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .stop-btn.visible { display: block; }

    /* 結果區 */
    #result-panel { display: flex; flex-direction: column; gap: 16px; }

    .result-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      gap: 8px;
      padding: 40px 0;
    }
    .result-empty svg { opacity: 0.4; }

    .patient-card { display: none; }
    .patient-card.visible { display: block; }

    .patient-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f3f4f6;
      margin-bottom: 16px;
    }

    .patient-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #1d4ed8;
    }

    .patient-name { font-size: 1.4rem; font-weight: 700; color: #111827; }
    .patient-id   { font-size: 0.85rem; color: #6b7280; margin-top: 2px; }

    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .field { background: #f9fafb; border-radius: 8px; padding: 12px; }
    .field-label { font-size: 0.75rem; color: #9ca3af; margin-bottom: 4px; }
    .field-value { font-size: 0.95rem; font-weight: 500; color: #111827; }

    .fhir-block {
      background: #0f172a;
      border-radius: 8px;
      padding: 14px;
      overflow-x: auto;
    }
    .fhir-block pre {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .fhir-block pre .key   { color: #7dd3fc; }
    .fhir-block pre .str   { color: #86efac; }
    .fhir-block pre .other { color: #fbbf24; }

    .confirm-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #16a34a;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }
    .confirm-btn:hover { background: #15803d; }
    .confirm-btn.visible { display: block; }

    .rescan-btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
      color: #374151;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }
    .rescan-btn:hover { background: #f3f4f6; }
    .rescan-btn.visible { display: block; }

    .confirmed-msg {
      text-align: center;
      padding: 14px;
      background: #f0fdf4;
      border-radius: 10px;
      color: #15803d;
      font-weight: 600;
      display: none;
    }
    .confirmed-msg.visible { display: block; }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
    <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M17 14h3M14 17v3"/>
  </svg>
  <div>
    <h1>FHIRpass 櫃檯掃碼系統</h1>
    <span>初診建檔模擬 · 軌道三</span>
  </div>
</header>

<main>
  <!-- 左欄：掃碼 -->
  <div class="card">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      相機掃碼
    </h2>
    <div id="reader"></div>
    <div id="scan-status" class="scan-status idle">點擊上方啟動相機</div>
    <button class="stop-btn" id="stop-btn" onclick="stopCamera()">
      ■ 關閉相機
    </button>
  </div>

  <!-- 右欄：建檔結果 -->
  <div class="card" id="result-panel">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      病患建檔預覽
    </h2>

    <div class="result-empty" id="empty-hint">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M17 14h3M14 17v3"/>
      </svg>
      <span>等待掃描病患 QR Code</span>
    </div>

    <div class="patient-card" id="patient-card">
      <div class="patient-header">
        <div class="patient-avatar">👤</div>
        <div>
          <div class="patient-name" id="p-name">—</div>
          <div class="patient-id" id="p-id">—</div>
        </div>
      </div>

      <div class="fields">
        <div class="field">
          <div class="field-label">生日</div>
          <div class="field-value" id="p-birthday">—</div>
        </div>
        <div class="field">
          <div class="field-label">性別</div>
          <div class="field-value" id="p-gender">—</div>
        </div>
        <div class="field" style="grid-column: 1 / -1">
          <div class="field-label">手機</div>
          <div class="field-value" id="p-phone">—</div>
        </div>
      </div>

      <div style="margin-top:16px">
        <div class="field-label" style="margin-bottom:8px; color:#374151; font-size:0.8rem; font-weight:600;">
          TW Core IG Patient JSON
        </div>
        <div class="fhir-block">
          <pre id="fhir-json"></pre>
        </div>
      </div>
    </div>

    <button class="confirm-btn" id="confirm-btn" onclick="confirmAdmit()">
      ✓ 確認寫入建檔
    </button>
    <button class="rescan-btn" id="rescan-btn" onclick="rescan()">
      重新掃描
    </button>
    <div class="confirmed-msg" id="confirmed-msg">
      ✅ 初診建檔完成！請引導病患至候診區。
    </div>
  </div>
</main>

<script>
  // ── 設定 ──────────────────────────────────────────────
  // frontend 由 backend 同源提供，直接用 origin 即可
  const BACKEND = window.location.origin;

  // ── 狀態 ──────────────────────────────────────────────
  let scanner = null;
  let isScanning = false;
  let lastPayload = "";

  // ── 啟動掃碼 ──────────────────────────────────────────
  async function startScanner() {
    if (isScanning) return;
    lastPayload = "";  // 每次重新開啟相機都重置，避免擋掉相同 QR Code
    document.getElementById("reader").innerHTML = "";  // 清除舊 DOM
    scanner = new Html5Qrcode("reader");
    isScanning = true;
    setStatus("scanning", "掃碼中，請將 QR Code 對準鏡頭…");
    setStopBtnVisible(true);

    try {
      await scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 220, height: 220 } },
        onScanSuccess,
        () => {}
      );
    } catch (err) {
      setStatus("error", "無法啟動相機：" + err);
      setStopBtnVisible(false);
      isScanning = false;
    }
  }

  async function stopScanner() {
    if (scanner && isScanning) {
      await scanner.stop();
      isScanning = false;
      scanner = null;
      setStopBtnVisible(false);
    }
  }

  async function stopCamera() {
    await stopScanner();
    setStatus("idle", "點擊上方相機區域啟動掃描");
  }

  // ── 掃到後處理 ────────────────────────────────────────
  async function onScanSuccess(payload) {
    if (payload === lastPayload) return;
    lastPayload = payload;

    setStatus("success", "掃描成功，解析中…");
    await stopScanner();  // 關閉相機

    try {
      const res = await fetch(`${BACKEND}/scan`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ payload }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail ?? "解碼失敗");
      }

      const data = await res.json();
      showPatient(data);
      setStatus("success", "✅ 解析完成，請確認資料無誤");
    } catch (e) {
      setStatus("error", "❌ " + e.message);
      lastPayload = "";
      startScanner();  // 解碼失敗則重啟相機繼續掃
    }
  }

  // ── 渲染病患資料 ──────────────────────────────────────
  function showPatient(data) {
    const raw = data.raw;
    document.getElementById("empty-hint").style.display = "none";
    document.getElementById("p-name").textContent = raw.name;
    document.getElementById("p-id").textContent = raw.id_number;
    document.getElementById("p-birthday").textContent = raw.birthday;
    document.getElementById("p-gender").textContent = raw.gender;
    document.getElementById("p-phone").textContent = raw.phone;
    document.getElementById("fhir-json").innerHTML = syntaxHighlight(data.patient);
    document.getElementById("patient-card").classList.add("visible");
    document.getElementById("confirm-btn").classList.add("visible");
    document.getElementById("rescan-btn").classList.add("visible");
    document.getElementById("confirmed-msg").classList.remove("visible");
  }

  // ── 確認寫入（模擬）────────────────────────────────────
  async function confirmAdmit() {
    document.getElementById("confirm-btn").classList.remove("visible");
    document.getElementById("rescan-btn").classList.remove("visible");
    document.getElementById("confirmed-msg").classList.add("visible");
    setStatus("idle", "建檔完成。可繼續掃下一位病患。");

    await delay(3000);
    resetForNext();
  }

  // ── 重新掃描（取消目前病患）──────────────────────────
  function rescan() {
    resetForNext();
  }

  function resetForNext() {
    lastPayload = "";
    document.getElementById("patient-card").classList.remove("visible");
    document.getElementById("confirm-btn").classList.remove("visible");
    document.getElementById("rescan-btn").classList.remove("visible");
    document.getElementById("confirmed-msg").classList.remove("visible");
    document.getElementById("empty-hint").style.display = "";
    startScanner();
  }

  // ── 工具 ──────────────────────────────────────────────
  function setStatus(type, msg) {
    const el = document.getElementById("scan-status");
    el.className = "scan-status " + type;
    el.textContent = msg;
  }

  function setStopBtnVisible(visible) {
    document.getElementById("stop-btn").classList.toggle("visible", visible);
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  function syntaxHighlight(obj) {
    return JSON.stringify(obj, null, 2)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
        if (/^"/.test(match)) {
          return /:$/.test(match)
            ? `<span class="key">${match}</span>`
            : `<span class="str">${match}</span>`;
        }
        return `<span class="other">${match}</span>`;
      });
  }

  // ── 頁面載入後啟動 ────────────────────────────────────
  document.getElementById("reader").addEventListener("click", startScanner);
  setStatus("idle", "點擊上方相機區域啟動掃描");
</script>

</body>
</html>
