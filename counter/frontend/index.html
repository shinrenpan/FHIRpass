<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FHIRpass 櫃檯掃碼系統</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a56db;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; opacity: 0.8; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 24px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 掃碼區 */
    #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; min-height: 280px; }
    #reader video { border-radius: 8px; }

    .scan-status {
      margin-top: 12px; padding: 10px 14px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 500; text-align: center;
    }
    .scan-status.idle     { background: #f3f4f6; color: #6b7280; }
    .scan-status.scanning { background: #eff6ff; color: #1d4ed8; }
    .scan-status.success  { background: #f0fdf4; color: #15803d; }
    .scan-status.error    { background: #fef2f2; color: #dc2626; }
    .scan-status.loading  { background: #fefce8; color: #92400e; }

    .stop-btn {
      width: 100%; margin-top: 10px; padding: 10px;
      border: 1px solid #d1d5db; border-radius: 8px; background: white;
      color: #6b7280; font-size: 0.9rem; cursor: pointer; display: none;
    }
    .stop-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .stop-btn.visible { display: block; }

    /* 結果區 */
    #result-panel { display: flex; flex-direction: column; gap: 12px; }

    .result-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #9ca3af; gap: 8px; padding: 40px 0;
    }
    .result-empty svg { opacity: 0.4; }

    .patient-card { display: none; }
    .patient-card.visible { display: block; }

    .patient-header {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 12px; border-bottom: 1px solid #f3f4f6; margin-bottom: 12px;
    }
    .patient-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: #dbeafe; display: flex; align-items: center;
      justify-content: center; font-size: 1.3rem; color: #1d4ed8;
      flex-shrink: 0;
    }
    .patient-name { font-size: 1.3rem; font-weight: 700; color: #111827; }
    .patient-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
    .patient-id   { font-size: 0.85rem; color: #6b7280; }
    .badge {
      font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; flex-shrink: 0;
    }
    .badge.existing { background: #dbeafe; color: #1d4ed8; }
    .badge.new      { background: #dcfce7; color: #15803d; }

    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { background: #f9fafb; border-radius: 8px; padding: 10px; }
    .field-label { font-size: 0.72rem; color: #9ca3af; margin-bottom: 3px; }
    .field-value { font-size: 0.9rem; font-weight: 500; color: #111827; }

    .fhir-id-bar {
      background: #f0f9ff; border: 1px solid #bae6fd;
      border-radius: 8px; padding: 8px 12px;
      font-size: 0.8rem; color: #0369a1;
      display: none;
    }
    .fhir-id-bar.visible { display: block; }

    /* 預約區塊 */
    .appt-section { display: none; }
    .appt-section.visible { display: block; }
    .appt-section h3 {
      font-size: 0.85rem; font-weight: 600; color: #374151;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .appt-list { display: flex; flex-direction: column; gap: 6px; }
    .appt-item {
      background: #f9fafb; border-radius: 8px; padding: 10px 12px;
      font-size: 0.85rem;
    }
    .appt-status {
      display: inline-block; font-size: 0.7rem; font-weight: 600;
      padding: 2px 7px; border-radius: 10px; margin-right: 6px;
    }
    .appt-status.booked    { background: #dbeafe; color: #1d4ed8; }
    .appt-status.proposed  { background: #dbeafe; color: #1d4ed8; }
    .appt-status.fulfilled { background: #dcfce7; color: #15803d; }
    .appt-status.cancelled { background: #fee2e2; color: #dc2626; }
    .appt-status.pending   { background: #fefce8; color: #92400e; }
    .appt-empty {
      font-size: 0.85rem; color: #9ca3af; text-align: center; padding: 12px 0;
    }
    .confirm-appt-btn {
      margin-left: auto; display: block; margin-top: 6px;
      padding: 4px 12px; border: none; border-radius: 6px;
      background: #16a34a; color: white; font-size: 0.8rem;
      font-weight: 600; cursor: pointer;
    }
    .confirm-appt-btn:hover { background: #15803d; }
    .confirm-appt-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    /* 按鈕 */
    .action-row { display: flex; flex-direction: column; gap: 8px; }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s; display: none;
    }
    .btn.visible { display: block; }
    .btn-primary { background: #16a34a; color: white; }
    .btn-primary:hover { background: #15803d; }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-secondary {
      background: white; color: #374151;
      border: 1px solid #d1d5db; font-weight: 500;
    }
    .btn-secondary:hover { background: #f3f4f6; }

    .error-msg {
      font-size: 0.85rem; color: #dc2626; background: #fef2f2;
      border-radius: 8px; padding: 10px 12px; display: none;
    }
    .error-msg.visible { display: block; }

    @media (max-width: 768px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
    <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M17 14h3M14 17v3"/>
  </svg>
  <div>
    <h1>FHIRpass 櫃檯掃碼系統</h1>
    <span>初診建檔 · 病患查詢 · 軌道三</span>
  </div>
</header>

<main>
  <!-- 左欄：掃碼 -->
  <div class="card">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      相機掃碼
    </h2>
    <div id="reader"></div>
    <div id="scan-status" class="scan-status idle">點擊上方啟動相機</div>
    <button class="stop-btn" id="stop-btn" onclick="stopCamera()">■ 關閉相機</button>
  </div>

  <!-- 右欄：結果 -->
  <div class="card" id="result-panel">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      病患資料
    </h2>

    <div class="result-empty" id="empty-hint">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M17 14h3M14 17v3"/>
      </svg>
      <span>等待掃描病患 QR Code</span>
    </div>

    <!-- 病患資訊卡 -->
    <div class="patient-card" id="patient-card">
      <div class="patient-header">
        <div class="patient-avatar">👤</div>
        <div>
          <div class="patient-name" id="p-name">—</div>
          <div class="patient-meta">
            <span class="patient-id" id="p-id">—</span>
            <span class="badge" id="p-badge"></span>
          </div>
        </div>
      </div>

      <div class="fields">
        <div class="field">
          <div class="field-label">生日</div>
          <div class="field-value" id="p-birthday">—</div>
        </div>
        <div class="field">
          <div class="field-label">性別</div>
          <div class="field-value" id="p-gender">—</div>
        </div>
        <div class="field" style="grid-column: 1 / -1">
          <div class="field-label">手機</div>
          <div class="field-value" id="p-phone">—</div>
        </div>
      </div>

      <div class="fhir-id-bar" id="fhir-id-bar"></div>
    </div>

    <!-- 預約記錄 -->
    <div class="appt-section" id="appt-section">
      <h3>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        預約記錄
      </h3>
      <div class="appt-list" id="appt-list"></div>
    </div>

    <!-- 錯誤訊息 -->
    <div class="error-msg" id="error-msg"></div>

    <!-- 操作按鈕 -->
    <div class="action-row">
      <button class="btn btn-primary" id="confirm-btn" onclick="confirmAdmit()">✓ 確認建檔</button>
      <button class="btn btn-secondary" id="rescan-btn" onclick="rescan()">重新掃描</button>
    </div>
  </div>
</main>

<script>
  const BACKEND = window.location.origin;

  let scanner = null;
  let isScanning = false;
  let lastPayload = "";
  let currentPatient = null;   // TW Core IG Patient JSON（待建檔）
  let currentFhirId = null;    // 已建檔的 FHIR ID

  // ── 掃碼 ───────────────────────────────────────────────

  async function startScanner() {
    if (isScanning) return;
    lastPayload = "";
    document.getElementById("reader").innerHTML = "";
    scanner = new Html5Qrcode("reader");
    isScanning = true;
    setStatus("scanning", "掃碼中，請將 QR Code 對準鏡頭…");
    showBtn("stop-btn", true);

    try {
      await scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 220, height: 220 } },
        onScanSuccess,
        () => {}
      );
    } catch (err) {
      setStatus("error", "無法啟動相機：" + err);
      showBtn("stop-btn", false);
      isScanning = false;
    }
  }

  async function stopScanner() {
    if (scanner && isScanning) {
      await scanner.stop();
      isScanning = false;
      scanner = null;
      showBtn("stop-btn", false);
    }
  }

  async function stopCamera() {
    await stopScanner();
    setStatus("idle", "點擊上方相機區域啟動掃描");
  }

  // ── 掃到後處理：decode → 查詢是否已存在 ───────────────

  async function onScanSuccess(payload) {
    if (payload === lastPayload) return;
    lastPayload = payload;

    setStatus("loading", "解析中…");
    await stopScanner();

    // Step 1: decode QR
    let scanData;
    try {
      const r = await fetch(`${BACKEND}/scan`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ payload }),
      });
      if (!r.ok) throw new Error((await r.json()).detail ?? "解碼失敗");
      scanData = await r.json();
    } catch (e) {
      setStatus("error", "❌ " + e.message);
      lastPayload = "";
      startScanner();
      return;
    }

    showPatientCard(scanData.raw, null, null);
    setStatus("loading", "查詢病患資料中…");

    // Step 2: 查詢是否已存在
    try {
      const r = await fetch(`${BACKEND}/patients/search?identifier=${scanData.raw.id_number}`);
      if (r.status === 404) {
        // 新病患
        currentPatient = scanData.patient;
        currentFhirId = null;
        showPatientCard(scanData.raw, null, false);
        showBtn("confirm-btn", true);
        showBtn("rescan-btn", true);
        setStatus("success", "✅ 新病患，請確認資料後建檔");
      } else if (r.ok) {
        // 既有病患
        const found = await r.json();
        currentPatient = null;
        currentFhirId = found.fhir_id;
        showPatientCard(scanData.raw, found.fhir_id, true);
        showBtn("confirm-btn", false);
        showBtn("rescan-btn", true);
        setStatus("success", "✅ 找到既有病患");
        await loadAppointments(found.fhir_id);
      } else {
        throw new Error("查詢失敗");
      }
    } catch (e) {
      showError("查詢時發生錯誤：" + e.message);
      showBtn("rescan-btn", true);
    }
  }

  // ── 渲染病患卡片 ────────────────────────────────────────

  function showPatientCard(raw, fhirId, isExisting) {
    document.getElementById("empty-hint").style.display = "none";
    document.getElementById("p-name").textContent = raw.name;
    document.getElementById("p-id").textContent = raw.id_number;
    document.getElementById("p-birthday").textContent = raw.birthday;
    document.getElementById("p-gender").textContent = raw.gender;
    document.getElementById("p-phone").textContent = raw.phone;

    const badge = document.getElementById("p-badge");
    if (isExisting === true) {
      badge.textContent = "既有病患"; badge.className = "badge existing";
    } else if (isExisting === false) {
      badge.textContent = "新病患"; badge.className = "badge new";
    } else {
      badge.textContent = ""; badge.className = "badge";
    }

    const fhirBar = document.getElementById("fhir-id-bar");
    if (fhirId) {
      fhirBar.textContent = `FHIR Patient ID：${fhirId}`;
      fhirBar.classList.add("visible");
    } else {
      fhirBar.classList.remove("visible");
    }

    document.getElementById("patient-card").classList.add("visible");
    document.getElementById("appt-section").classList.remove("visible");
    document.getElementById("error-msg").classList.remove("visible");
  }

  // ── 載入預約記錄 ────────────────────────────────────────

  async function loadAppointments(fhirId) {
    const section = document.getElementById("appt-section");
    const list = document.getElementById("appt-list");
    section.classList.add("visible");
    list.innerHTML = "<div class='appt-empty'>載入中…</div>";

    try {
      const r = await fetch(`${BACKEND}/patients/${fhirId}/appointments`);
      const data = await r.json();
      if (!data.appointments.length) {
        list.innerHTML = "<div class='appt-empty'>尚無預約記錄</div>";
        return;
      }
      list.innerHTML = data.appointments.map(a => {
        const statusCls = a.status || "pending";
        const statusText = { booked: "已確認", proposed: "待確認", fulfilled: "已就診", cancelled: "已取消", pending: "待確認" }[a.status] ?? a.status;
        const dateStr = a.start ? new Date(a.start).toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }) : "—";
        const confirmBtn = a.status === "proposed"
          ? `<button class="confirm-appt-btn" onclick="confirmAppt('${a.id}', this)">✓ 確認</button>`
          : "";
        return `<div class="appt-item">
          <span class="appt-status ${statusCls}">${statusText}</span>
          ${dateStr}${a.description ? "　" + a.description : ""}
          ${confirmBtn}
        </div>`;
      }).join("");
    } catch {
      list.innerHTML = "<div class='appt-empty'>預約資料載入失敗</div>";
    }
  }

  // ── 確認預約 ────────────────────────────────────────────

  async function confirmAppt(apptId, btn) {
    btn.disabled = true;
    btn.textContent = "確認中…";
    try {
      const r = await fetch(`${BACKEND}/appointments/${apptId}/confirm`, { method: "PATCH" });
      if (!r.ok) throw new Error("確認失敗");
      await loadAppointments(currentFhirId);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = "✓ 確認";
      showError("預約確認失敗：" + e.message);
    }
  }

  // ── 確認建檔 ────────────────────────────────────────────

  async function confirmAdmit() {
    const btn = document.getElementById("confirm-btn");
    btn.disabled = true;
    btn.textContent = "建檔中…";
    showError(null);
    setStatus("loading", "寫入 FHIR Server 中…");

    try {
      const r = await fetch(`${BACKEND}/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(currentPatient),
      });
      if (!r.ok) throw new Error((await r.json()).detail ?? "寫入失敗");

      const result = await r.json();
      currentFhirId = result.fhir_id;
      const raw = extractRaw();
      showPatientCard(raw, result.fhir_id, false);
      showBtn("confirm-btn", false);
      setStatus("success", "✅ 建檔完成！可繼續掃下一位病患。");
      await loadAppointments(result.fhir_id);
    } catch (e) {
      showError("建檔失敗：" + e.message);
      btn.disabled = false;
      btn.textContent = "✓ 確認建檔";
      setStatus("error", "❌ 建檔失敗");
    }
  }

  function extractRaw() {
    return {
      name: document.getElementById("p-name").textContent,
      id_number: document.getElementById("p-id").textContent,
      birthday: document.getElementById("p-birthday").textContent,
      gender: document.getElementById("p-gender").textContent,
      phone: document.getElementById("p-phone").textContent,
    };
  }

  // ── 重新掃描 ────────────────────────────────────────────

  function rescan() { resetAndScan(); }

  function resetAndScan() {
    lastPayload = "";
    currentPatient = null;
    currentFhirId = null;
    document.getElementById("patient-card").classList.remove("visible");
    document.getElementById("appt-section").classList.remove("visible");
    document.getElementById("fhir-id-bar").classList.remove("visible");
    document.getElementById("error-msg").classList.remove("visible");
    document.getElementById("empty-hint").style.display = "";
    showBtn("confirm-btn", false);
    showBtn("rescan-btn", false);
    const btn = document.getElementById("confirm-btn");
    btn.disabled = false;
    btn.textContent = "✓ 確認建檔";
    startScanner();
  }

  // ── 工具 ────────────────────────────────────────────────

  function setStatus(type, msg) {
    const el = document.getElementById("scan-status");
    el.className = "scan-status " + type;
    el.textContent = msg;
  }

  function showBtn(id, visible) {
    document.getElementById(id).classList.toggle("visible", visible);
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    if (msg) { el.textContent = msg; el.classList.add("visible"); }
    else { el.classList.remove("visible"); }
  }

  // ── 啟動 ────────────────────────────────────────────────

  document.getElementById("reader").addEventListener("click", resetAndScan);
  setStatus("idle", "點擊上方相機區域啟動掃描");
</script>

</body>
</html>
